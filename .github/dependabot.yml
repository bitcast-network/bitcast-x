version: 2
updates:
- package-ecosystem: pip
  directory: /
  schedule:
    interval: weekly
    day: monday
  open-pull-requests-limit: 10
  labels:
  - dependencies
  commit-message:
    prefix: deps
  allow:
    - dependency-name: bittensor
    - dependency-name: opentensor
  automerge: true
- package-ecosystem: github-actions
  directory: /
  schedule:
    interval: weekly
    day: monday
  open-pull-requests-limit: 5
  labels:
  - ci
  commit-message:
    prefix: ci
  allow:
    - dependency-name: bittensor
    - dependency-name: opentensor
  automerge: true
